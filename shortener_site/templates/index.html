<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shortener</title>
</head>
<body>
    <div class="container">
        <h1>Welcome to shortener site!</h1>
        <p>What you want short?</p>
        <form method="post" novalidate>
            <input type="url" name="link" placeholder="Paste your link here..." required>
            <button type="submit">Create</button>
        </form>
        {% if fail == 1 %}
            <p>Wrong link, try another time</p>
        {% else %}
            <p>{{ link }}</p>
        {% endif %}
    </div>
</body>
</html>
