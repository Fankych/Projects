<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign-In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Sign-In</h1>
        {% if fail %}
            <p class="fail">Wrong password check or this user already exist</p>
        {% endif %}
        <form method="post">
            <input type="text" name="login" placeholder="Login" value="{{ login }}" required>
            <input type="password" name="password" placeholder="Password" required>
            <input type="password" name="check_pass" placeholder="Password check" required>
            <button type="submit">Sign-In</button>
            <a href="/" class="btn">Already have account</a>
        </form>
    </div>
</body>
</html>
